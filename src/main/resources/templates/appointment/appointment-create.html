<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Create Appointment</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #f0f4f8; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
        * { box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; }
        .topbar { max-width: 640px; margin: 0 auto 28px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: #555; font-size: 13px; padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; }
        .page-header { max-width: 640px; margin: 0 auto 28px; }
        .badge-post { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; font-family: var(--mono); font-size: 11px; padding: 4px 14px; border-radius: 8px; text-transform: uppercase; }
        .content-card { max-width: 640px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 2px 16px rgba(0,0,0,0.07); padding: 32px; }
        .form-grid { display: grid; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; }
        .form-group input { padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: var(--font); transition: border 0.2s; }
        .form-group input:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn-post { background: #f59e0b; color: white; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .success-msg { color: #15803d; background: #f0fdf4; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
<div class="topbar"><a th:href="@{/entity/anubhob/Appointment}" class="back-btn">← Back</a></div>
<div class="page-header">
    <span class="badge-post">POST</span>
    <h2 style="margin-top:8px;">Create Appointment Record</h2>
</div>
<div class="content-card">
    <div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div>
    <form th:action="@{/entity/anubhob/Appointment/create}" method="post" class="form-grid">
        <div class="form-group"><label for="appointmentId">Appointment ID</label><input id="appointmentId" type="number" name="appointmentId" required/></div>
        <div class="form-group"><label for="patientSsn">Patient SSN</label><input id="patientSsn" type="number" name="patientSsn" required/></div>
        <div class="form-group"><label for="prepNurseId">Prep Nurse ID (optional)</label><input id="prepNurseId" type="number" name="prepNurseId"/></div>
        <div class="form-group"><label for="physicianId">Physician ID</label><input id="physicianId" type="number" name="physicianId" required/></div>
        <div class="form-group"><label for="start">Start</label><input id="start" type="datetime-local" name="start" required/></div>
        <div class="form-group"><label for="end">End</label><input id="end" type="datetime-local" name="end" required/></div>
        <div class="form-group"><label for="examinationRoom">Examination Room</label><input id="examinationRoom" type="text" name="examinationRoom" required/></div>
        <button class="btn-post" type="submit">Save Appointment</button>
    </form>
</div>
</body>
</html>
