<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Find Affiliations by Physician</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #f0f4f8; --card-bg: #ffffff; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; --green: #16a34a; --red: #dc2626; }
    body { font-family: var(--font); background: var(--bg); padding: 40px 24px; color: #1e293b; }
    .topbar { max-width: 1000px; margin: 0 auto 28px; }
    .back-btn { text-decoration: none; color: #64748b; font-size: 13px; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; display: inline-flex; align-items: center; gap: 6px; }
    .page-header { max-width: 1000px; margin: 0 auto 28px; }
    .badge { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 8px; background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; text-transform: uppercase; }
    .content-card { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
    .search-bar { padding: 32px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-end; gap: 12px; background: #fafbfc; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
    .form-group input { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; width: 280px; font-family: var(--font); }
    .btn { padding: 12px 28px; border: none; border-radius: 10px; background: #22c55e; color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .dataTables_wrapper { padding: 24px; font-family: var(--font); }
    table.dataTable thead th { background: #f8fafc !important; color: #64748b !important; font-size: 11px !important; text-transform: uppercase !important; border-bottom: 1px solid #e2e8f0 !important; padding: 14px 20px !important; }
    table.dataTable tbody td { padding: 14px 20px !important; border-bottom: 1px solid #f1f5f9 !important; font-size: 14px; }
    .mono-text { font-family: var(--mono); font-size: 13px; color: #475569; }
  </style>
</head>
<body>

<div class="topbar"><a th:href="@{/entity/ayan/AffiliatedWith}" class="back-btn">← Back</a></div>

<div class="page-header">
  <span class="badge">GET</span>
  <h2 style="margin-top:8px;">Search Affiliations by Physician</h2>
</div>

<div class="content-card">
  <form th:action="@{/entity/ayan/AffiliatedWith/searchByPhysician}" method="get" class="search-bar">
    <div class="form-group">
      <label>Physician ID</label>
      <input type="number" name="physicianId" placeholder="e.g. 1" th:value="${param.physicianId}" required/>
    </div>
    <button class="btn" type="submit">Lookup</button>
  </form>

  <div th:if="${affiliationsByPhysician != null}">
    <table id="affiliationTable" class="display" style="width:100%">
      <thead>
      <tr>
        <th>Physician ID</th>
        <th>Physician Name</th>
        <th>Department ID</th>
        <th>Department Name</th>
        <th>Primary Affiliation</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="a : ${affiliationsByPhysician}">
        <td class="mono-text" th:text="${a.physician != null ? a.physician : a['physician']}"></td>
        <td style="font-weight: 500;" th:text="${a.physicianName != null ? a.physicianName : a['physicianName']}"></td>
        <td class="mono-text" th:text="${a.department != null ? a.department : a['department']}"></td>
        <td style="font-weight: 500;" th:text="${a.departmentName != null ? a.departmentName : a['departmentName']}"></td>
        <td class="mono-text" th:text="${a.primaryAffiliation != null ? a.primaryAffiliation : a['primaryAffiliation']}"></td>
      </tr>
      </tbody>
    </table>

    <div th:if="${#lists.isEmpty(affiliationsByPhysician)}" style="padding: 40px; text-align: center; color: #94a3b8;">
      No records found for Physician ID: <strong th:text="${param.physicianId}"></strong>
    </div>
  </div>
</div>

<script>
  $(document).ready(function() {
      if ($('#affiliationTable tbody tr').length > 0) {
          $('#affiliationTable').DataTable({
              "paging": true,
              "ordering": true,
              "info": true,
              "searching": true,
              "pageLength": 5,
              "language": { "search": "", "searchPlaceholder": "Filter results..." }
          });
      }
  });
</script>

</body>
</html>
