<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"><head><meta charset="UTF-8"/><title>Search Prescribes by 3 Fields</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/><style>:root{--bg:#f0f4f8;--radius:16px;--font:'DM Sans',sans-serif}*{box-sizing:border-box}body{font-family:var(--font);background:var(--bg);padding:40px 24px}.topbar,.page-header,.content-card{max-width:980px;margin:0 auto 28px}.back-btn{display:inline-flex;text-decoration:none;color:#555;font-size:13px;padding:6px 16px;border:1px solid #ddd;border-radius:20px;background:#fff}.badge{font-size:11px;padding:4px 14px;border-radius:8px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;text-transform:uppercase}.content-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden}.search-bar{padding:24px 28px;border-bottom:1px solid #f0f0f0;display:grid;grid-template-columns:repeat(3,minmax(140px,1fr));gap:12px;align-items:end}.form-group{display:flex;flex-direction:column;gap:5px}.form-group label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase}.form-group input{padding:10px;border:1.5px solid #e5e7eb;border-radius:10px;outline:none;width:100%}.btn{grid-column:1/-1;justify-self:start;padding:10px 24px;border:none;border-radius:10px;background:#22c55e;color:#fff;font-weight:600;cursor:pointer}.result-wrap{padding:20px 24px 26px;overflow-x:auto}table{width:100%;border-collapse:collapse}th{background:#f8fafc;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;padding:14px 20px;text-align:left}td{padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:14px}.empty{padding:24px;color:#94a3b8}</style></head><body><div class="topbar"><a th:href="@{/entity/anubhob/Prescribes}" class="back-btn">← Back</a></div><div class="page-header"><span class="badge">GET</span><h2 style="margin-top:8px;">Search by Physician + Patient + Medication</h2></div><div class="content-card"><form th:action="@{/entity/anubhob/Prescribes/search}" method="get" class="search-bar"><div class="form-group"><label for="physicianId">Physician ID</label><input id="physicianId" type="number" name="physicianId" required/></div><div class="form-group"><label for="patientSsn">Patient SSN</label><input id="patientSsn" type="number" name="patientSsn" required/></div><div class="form-group"><label for="medicationCode">Medication Code</label><input id="medicationCode" type="number" name="medicationCode" required/></div><button class="btn" type="submit">Search</button></form><div class="result-wrap" th:if="${prescribesBySearch != null and !prescribesBySearch.isEmpty()}"><table><thead><tr><th th:each="key : ${prescribesBySearch[0].keySet()}" th:text="${key}"></th></tr></thead><tbody><tr th:each="p : ${prescribesBySearch}"><td th:each="val : ${p.values()}" th:text="${val}"></td></tr></tbody></table></div><p class="empty" th:if="${prescribesBySearch == null}">Fill all three filters to search.</p><p class="empty" th:if="${prescribesBySearch != null and prescribesBySearch.isEmpty()}">No matching records found.</p></div></body></html>
