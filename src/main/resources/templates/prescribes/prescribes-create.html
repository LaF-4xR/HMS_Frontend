<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"><head><meta charset="UTF-8"/><title>Create Prescribes</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/><style>:root{--bg:#f0f4f8;--radius:16px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}*{box-sizing:border-box}body{font-family:var(--font);background:var(--bg);padding:40px 24px}.topbar,.page-header,.content-card{max-width:640px;margin:0 auto 28px}.back-btn{display:inline-flex;text-decoration:none;color:#555;font-size:13px;padding:6px 16px;border:1px solid #ddd;border-radius:20px;background:#fff}.badge-post{background:#fffbeb;color:#d97706;border:1px solid #fde68a;font-family:var(--mono);font-size:11px;padding:4px 14px;border-radius:8px;text-transform:uppercase}.content-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(0,0,0,.07);padding:32px}.form-grid{display:grid;gap:18px}.form-group{display:flex;flex-direction:column;gap:6px}.form-group label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase}.form-group input{padding:12px;border:1.5px solid #e5e7eb;border-radius:10px}.btn-post{background:#f59e0b;color:#fff;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer}.success-msg{color:#15803d;background:#f0fdf4;padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;text-align:center;border:1px solid #bbf7d0}</style></head><body><div class="topbar"><a th:href="@{/entity/anubhob/Prescribes}" class="back-btn">← Back</a></div><div class="page-header"><span class="badge-post">POST</span><h2 style="margin-top:8px;">Create Prescribes Record</h2></div><div class="content-card"><div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div><form th:action="@{/entity/anubhob/Prescribes/create}" method="post" class="form-grid"><div class="form-group"><label for="physicianId">Physician ID</label><input id="physicianId" type="number" name="physicianId" required/></div><div class="form-group"><label for="patientSsn">Patient SSN</label><input id="patientSsn" type="number" name="patientSsn" required/></div><div class="form-group"><label for="medicationCode">Medication Code</label><input id="medicationCode" type="number" name="medicationCode" required/></div><div class="form-group"><label for="date">Date</label><input id="date" type="datetime-local" name="date" required/></div><div class="form-group"><label for="appointmentId">Appointment ID (optional)</label><input id="appointmentId" type="number" name="appointmentId"/></div><div class="form-group"><label for="dose">Dose</label><input id="dose" type="text" name="dose" required/></div><button class="btn-post" type="submit">Save Prescription</button></form></div></body></html>
