<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>All Nurses – Nurse API</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

    <style>
        /* 1. Global Styles (From your previous design) */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --radius: 16px;
            --font: 'DM Sans', sans-serif;
            --mono: 'DM Mono', monospace;
            --green: #16a34a;
            --red: #dc2626;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            min-height: 100vh;
            padding: 40px 24px 64px;
            color: #1e293b;
        }

        /* 2. Layout Components */
        .topbar { max-width: 1100px; margin: 0 auto 28px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none; color: #64748b; font-size: 13px;
            padding: 8px 18px; border: 1px solid #e2e8f0;
            border-radius: 20px; background: #fff; transition: all 0.2s;
        }
        .back-btn:hover { background: #f8fafc; border-color: #cbd5e1; }

        .page-header { max-width: 1100px; margin: 0 auto 28px; }
        .badge {
            font-family: var(--mono); font-size: 11px; padding: 4px 12px;
            border-radius: 8px; background: #f0fdf4; color: var(--green);
            border: 1px solid #bbf7d0; text-transform: uppercase;
        }

        .content-card {
            max-width: 1100px; margin: 0 auto;
            background: #fff; border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
        }

        /* 3. DataTables Customization (Keeping it nice) */
        .dataTables_wrapper { font-family: var(--font); color: #475569; }

        /* Search Box styling */
        .dataTables_filter input {
            border: 1px solid #e2e8f0 !important;
            border-radius: 8px !important;
            padding: 6px 12px !important;
            margin-bottom: 20px !important;
            outline: none !important;
        }

        /* Table Header styling */
        table.dataTable thead th {
            background: #f8fafc !important;
            color: #64748b !important;
            font-size: 11px !important;
            text-transform: uppercase !important;
            letter-spacing: 0.05em !important;
            border-bottom: 1px solid #e2e8f0 !important;
            padding: 14px 20px !important;
        }

        /* Table Body styling */
        table.dataTable tbody td {
            padding: 14px 20px !important;
            border-bottom: 1px solid #f1f5f9 !important;
            font-size: 14px;
        }

        .mono-text { font-family: var(--mono); font-size: 13px; color: #475569; }

        /* Status Badge inside table */
        .status-pill {
            font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
        }
        .status-reg { background: #f0fdf4; color: var(--green); }
        .status-not { background: #fef2f2; color: var(--red); }

        /* Pagination buttons */
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #1e293b !important; color: white !important; border: none !important; border-radius: 6px !important;
        }
    </style>
</head>
<body>

<div class="topbar">
    <a th:href="@{/entity/arunima/Nurse}" class="back-btn">← Back to Endpoints</a>
</div>

<div class="page-header">
    <span class="badge">GET</span>
    <h2 style="margin-top:8px;">All Nurse Records</h2>
    <p style="color: #94a3b8; font-family: var(--mono); font-size: 12px; margin-top: 4px;">/entity/arunima/Nurse/all</p>
</div>

<div class="content-card">
    <table id="nurseTable" class="display" style="width:100%">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Position</th>
            <th>Status</th>
            <th>SSN</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="n : ${nurses}">
            <td class="mono-text" th:text="${n.employeeId}"></td>
            <td style="font-weight: 500;" th:text="${n.name}"></td>
            <td th:text="${n.position}"></td>
            <td th:text = "${n.registered}"></td>
            <td class="mono-text" th:text="${n.ssn}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
        $('#nurseTable').DataTable({
            "paging": true,
            "ordering": true,
            "info": true,
            "searching": true,
            "pageLength": 10,
            "language": {
                "search": "",
                "searchPlaceholder": "Search by name or ID...",
                "lengthMenu": "Show _MENU_ entries"
            }
        });
    });
</script>

</body>
</html>
