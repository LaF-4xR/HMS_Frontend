<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Update Physician Record</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f0f4f8; --card-bg: #ffffff; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
    body { font-family: var(--font); background: var(--bg); min-height: 100vh; padding: 40px 24px 64px; color: #111; }
    .topbar { max-width: 700px; margin: 0 auto 28px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: #555; font-size: 13px; padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; transition: background 0.15s; }
    .back-btn:hover { background: #f5f5f5; }
    .page-header { max-width: 700px; margin: 0 auto 28px; }
    .badge-post { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 4px 14px; border-radius: 8px; letter-spacing: 0.5px; text-transform: uppercase; background: #fffbeb; color: #d97706; border: 1px solid #fde68a; display: inline-block; margin-bottom: 8px; }
    h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .content-card { max-width: 700px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 2px 16px rgba(0,0,0,0.07); padding: 32px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: var(--font); background: #fafafa; transition: all 0.2s; }
    .form-group input:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); background: #fff; }
    .btn-update { grid-column: span 2; background: #f59e0b; color: white; padding: 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
    .btn-update:hover { opacity: 0.9; }
    .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; font-size: 13.5px; color: #15803d; text-align: center; }
    .error-banner { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; font-size: 13.5px; color: #dc2626; text-align: center; }
  </style>
</head>
<body>

<div class="topbar">
  <a th:href="@{/entity/ayan/Physician}" class="back-btn">← Back to Endpoints</a>
</div>

<div class="page-header">
  <span class="badge-post">PUT</span>
  <h2>Update Physician Record</h2>
  <p style="color: #aaa; font-family: var(--mono); font-size: 12px; margin-top: 4px;">/entity/ayan/Physician/update/{id}</p>
</div>

<div class="content-card">
  <div class="success-banner" th:if="${successMessage != null}">
    ✅ <span th:text="${successMessage}">Record updated successfully.</span>
  </div>
  <div class="error-banner" th:if="${errorMessage != null}">
    ❌ <span th:text="${errorMessage}">Failed to update record.</span>
  </div>

  <form th:action="@{/entity/ayan/Physician/updateForm}" method="post" class="form-grid">
    <div class="form-group full-width">
      <label>Employee ID (Target for Update)</label>
      <input type="number" name="id" placeholder="Enter ID to modify" required/>
    </div>

    <div class="form-group full-width">
      <label>New Name</label>
      <input type="text" name="name" placeholder="Enter Name to modify"/>
    </div>

    <div class="form-group">
      <label>New Position</label>
      <input type="text" name="position" placeholder="e.g. Senior Surgeon"/>
    </div>

    <div class="form-group">
      <label>New SSN</label>
      <input type="number" name="ssn" placeholder="New SSN digits"/>
    </div>

    <button class="btn-update" type="submit">Apply Changes</button>
  </form>
</div>

</body>
</html>
