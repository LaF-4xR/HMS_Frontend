<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>All Medications</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #f0f4f8; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; }
        .topbar { max-width: 1100px; margin: 0 auto 28px; }
        .back-btn { text-decoration: none; color: #64748b; font-size: 13px; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; }
        .content-card { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .mono-text { font-family: var(--mono); font-size: 13px; }
    </style>
</head>
<body>
<div class="topbar"><a th:href="@{/entity/arunima/Medication}" class="back-btn">← Dashboard</a></div>
<div class="content-card">
    <table id="medTable" class="display" style="width:100%">
        <thead>
        <tr>
            <th th:each="key : ${medications[0].keySet()}" th:text="${key}">Key</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${medications}">
            <td th:each="val : ${m.values()}" th:text="${val}" class="mono-text"></td>
        </tr>
        </tbody>
    </table>
</div>
<script>$(document).ready(function() { $('#medTable').DataTable(); });</script>
</body>
</html>
