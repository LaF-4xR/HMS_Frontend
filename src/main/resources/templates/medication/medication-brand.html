<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Find Medication by Brand</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #f0f4f8; --card-bg: #ffffff; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; --green: #16a34a; --purple: #7c3aed; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; color: #1e293b; }
        .topbar { max-width: 1000px; margin: 0 auto 28px; }
        .back-btn { text-decoration: none; color: #64748b; font-size: 13px; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; display: inline-flex; align-items: center; gap: 6px; }
        .page-header { max-width: 1000px; margin: 0 auto 28px; }
        .badge { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 8px; background: #f5f3ff; color: var(--purple); border: 1px solid #ddd6fe; text-transform: uppercase; }
        .content-card { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .search-bar { padding: 32px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-end; gap: 12px; background: #fafbfc; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .form-group input { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; width: 280px; font-family: var(--font); }
        .btn { padding: 12px 28px; border: none; border-radius: 10px; background: #22c55e; color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }

        .dataTables_wrapper { padding: 24px; font-family: var(--font); }
        table.dataTable thead th { background: #f8fafc !important; color: #64748b !important; font-size: 11px !important; text-transform: uppercase !important; border-bottom: 1px solid #e2e8f0 !important; padding: 14px 20px !important; }
        table.dataTable tbody td { padding: 14px 20px !important; border-bottom: 1px solid #f1f5f9 !important; font-size: 14px; }
        .mono-text { font-family: var(--mono); font-size: 13px; color: #475569; }
    </style>
</head>
<body>

<div class="topbar">
    <a th:href="@{/entity/arunima/Medication}" class="back-btn">← Back to Medications</a>
</div>

<div class="page-header">
    <span class="badge">GET</span>
    <h2 style="margin-top:8px;">Search Medication by Brand</h2>
</div>

<div class="content-card">
    <form th:action="@{/entity/arunima/Medication/searchByBrand}" method="get" class="search-bar">
        <div class="form-group">
            <label>Brand Name</label>
            <input type="text" name="brand" placeholder="e.g. Pfizer" th:value="${param.brand}" required/>
        </div>
        <button class="btn" type="submit">Lookup</button>
    </form>

    <div th:if="${medicationByBrand != null}">
        <table id="brandTable" class="display" style="width:100%">
            <thead>
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Description</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="med : ${medicationByBrand}">
                <td class="mono-text" th:text="${med.code}"></td>
                <td style="font-weight: 500;" th:text="${med.name}"></td>
                <td th:text="${med.brand}"></td>
                <td th:text="${med.description}"></td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(medicationByBrand)}" style="padding: 40px; text-align: center; color: #94a3b8;">
            No medications found for brand: <strong th:text="${param.brand}"></strong>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        if ($('#brandTable tbody tr').length > 0) {
            $('#brandTable').DataTable({
                "paging": true,
                "ordering": true,
                "info": true,
                "searching": true,
                "pageLength": 5,
                "language": {
                    "search": "",
                    "searchPlaceholder": "Filter brand results..."
                }
            });
        }
    });
</script>

</body>
</html>
