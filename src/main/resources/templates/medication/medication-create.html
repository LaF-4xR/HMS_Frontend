<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Add Medication</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #f0f4f8; --font: 'DM Sans', sans-serif; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; }
        .content-card { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; background: #f59e0b; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .success { background: #f0fdf4; color: #16a34a; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #bbf7d0; font-size: 14px; }
    </style>
</head>
<body>
<div class="content-card">
    <a th:href="@{/entity/arunima/Medication}" style="text-decoration:none; color:#64748b; font-size:13px;">← Back</a>
    <h2 style="margin: 16px 0 24px;">New Medication</h2>
    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <form th:action="@{/entity/arunima/Medication/create}" method="post">
        <div class="form-group"><label>Code</label><input type="number" name="code" required></div>
        <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Brand</label><input type="text" name="brand" required></div>
        <div class="form-group"><label>Description</label><input type="text" name="description"></div>
        <button type="submit" class="btn">Register Medication</button>
    </form>
</div>
</body>
</html>
