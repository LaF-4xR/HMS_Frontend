<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Find Stay by ID</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #f0f4f8; --card-bg: #ffffff; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; color: #111; }
        .topbar { max-width: 800px; margin: 0 auto 28px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: #555; font-size: 13px; padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; }
        .page-header { max-width: 800px; margin: 0 auto 28px; }
        .badge { font-family: var(--mono); font-size: 11px; background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
        .content-card { max-width: 800px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        .search-bar { padding: 32px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: flex-end; gap: 16px; background: #fafafa; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { padding: 10px; border: 1.5px solid #e5e7eb; border-radius: 10px; outline: none; width: 250px; }
        .btn { padding: 10px 24px; border: none; border-radius: 10px; background: #22c55e; color: #fff; font-weight: 600; cursor: pointer; }
        .record-detail { padding: 24px; }
        .field-row { display: flex; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
        .field-key { font-size: 11px; font-weight: 700; color: #999; width: 140px; text-transform: uppercase; }
        .field-val { font-family: var(--mono); font-size: 14px; }
    </style>
</head>
<body>
<div class="topbar"><a href="/entity/soumadwip/Stay" class="back-btn">← Back</a></div>
<div class="page-header">
    <span class="badge">GET</span>
    <h2 style="margin-top:8px;">Search Stay by ID</h2>
</div>
<div class="content-card">
    <form th:action="@{/entity/soumadwip/Stay/searchById}" method="get" class="search-bar">
        <div class="form-group"><label>Stay ID</label><input type="number" name="id" placeholder="Enter ID..." required/></div>
        <button type="submit" class="btn">Fetch Record</button>
    </form>
    <div class="record-detail" th:if="${stayById != null}">
        <div class="field-row"><div class="field-key">Stay ID</div><div class="field-val" th:text="${stayById.stayId}"></div></div>
        <div class="field-row"><div class="field-key">Patient ID</div><div class="field-val" th:text="${stayById.patientId}"></div></div>
        <div class="field-row"><div class="field-key">Room ID</div><div class="field-val" th:text="${stayById.roomId}"></div></div>
        <div class="field-row"><div class="field-key">Start</div><div class="field-val" th:text="${stayById.stayStart}"></div></div>
        <div class="field-row"><div class="field-key">End</div><div class="field-val" th:text="${stayById.stayEnd}"></div></div>
    </div>
</div>
</body>
</html>
