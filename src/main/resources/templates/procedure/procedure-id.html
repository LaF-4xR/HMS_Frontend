<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Find Procedure by Code</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #f0f4f8; --radius: 16px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; --orange: #f87c4f; }
        body { font-family: var(--font); background: var(--bg); padding: 40px 24px; color: #1e293b; }
        .topbar { max-width: 1000px; margin: 0 auto 28px; }
        .back-btn { text-decoration: none; color: #64748b; font-size: 13px; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; display: inline-flex; align-items: center; gap: 6px; }
        .page-header { max-width: 1000px; margin: 0 auto 28px; }
        .badge { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 8px; background: #fff7ed; color: var(--orange); border: 1px solid #fed7aa; text-transform: uppercase; }
        .content-card { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .search-bar { padding: 32px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-end; gap: 12px; background: #fafbfc; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .form-group input { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; width: 280px; font-family: var(--font); }
        .form-group input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(248,124,79,0.1); }
        .btn { padding: 12px 28px; border: none; border-radius: 10px; background: #22c55e; color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .result-box { margin: 28px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 12px; overflow: hidden; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #fed7aa; font-size: 14px; }
        .result-row:last-child { border-bottom: none; }
        .result-key { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .result-val { font-family: var(--mono); font-size: 13px; color: #1e293b; font-weight: 500; }
        .no-result { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="topbar"><a th:href="@{/entity/bidwattam/Procedures}" class="back-btn">← Back</a></div>

<div class="page-header">
    <span class="badge">GET</span>
    <h2 style="margin-top:8px;">Search Procedure by Code</h2>
    <p style="color: #94a3b8; font-family: var(--mono); font-size: 12px; margin-top: 4px;">/entity/bidwattam/Procedures/{code}</p>
</div>

<div class="content-card">
    <form th:action="@{/entity/bidwattam/Procedures/searchById}" method="get" class="search-bar">
        <div class="form-group">
            <label>Procedure Code</label>
            <input type="number" name="code" placeholder="e.g. 1" th:value="${param.code}" required/>
        </div>
        <button class="btn" type="submit">Lookup</button>
    </form>

    <div th:if="${procedureById != null}" class="result-box">
        <div class="result-row">
            <span class="result-key">Code</span>
            <span class="result-val" th:text="${procedureById.code}"></span>
        </div>
        <div class="result-row">
            <span class="result-key">Name</span>
            <span class="result-val" th:text="${procedureById.name}"></span>
        </div>
        <div class="result-row">
            <span class="result-key">Cost</span>
            <span class="result-val" th:text="${procedureById.cost}"></span>
        </div>
    </div>

    <div class="no-result" th:if="${procedureById == null and param.code != null}">
        No procedure found for code: <strong th:text="${param.code}"></strong>
    </div>
</div>

</body>
</html>
